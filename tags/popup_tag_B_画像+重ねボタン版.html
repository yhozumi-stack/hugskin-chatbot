<!-- ============================================================
  離脱ポップアップ タグ【B: 画像+重ねボタン版】(理想形)
  ------------------------------------------------------------
  クリエイティブ画像の上にCTAボタンを重ねて表示する。
  画像自体は押せない(ボタンと×だけ反応)ので誤タップが起きない。
  画像はボタン無しで作り、下部にボタンを重ねる余白を確保しておくこと。

  ecforceタグ管理: チャットのタグの下(bodyの最後でもOK)に貼る。
  設定は全部このタグ内で完結=変更はタグ編集のみ・push不要・このLPだけに効く。

  ▼テスト時はこの2行を書き換える:
    triggers: ['back', 'delay5000'],   ← 5秒で出る
    oncePer: 'always',                 ← 毎回出る
  ============================================================ -->
<script>
window.HS_POPUP = {
  triggers: ['back', 'delay60000'],  /* ブラウザバック + 60秒経過 */
  image: 'https://yhozumi-stack.github.io/hugskin-chatbot/img/popup.png',  /* ⚠️ボタン無しのクリエイティブに差し替え */
  /* imageClickable は書かない(既定false)=画像は押せず、下のボタンだけ反応 */
  ctaText: '{{PRICE}}で試してみる',   /* PRICEはチャットのvarsから自動引き継ぎ。未設定なら「ご案内を見る」 */
  ctaAction: 'chat',                 /* タップでチャット起動('form'=フォームへ / URL=遷移) */
  ctaBottom: '7%',                   /* ボタンの画像下端からの位置(画像の余白に合わせ微調整) */
  ctaWidth: '78%',                   /* ボタンの幅 */
  closeText: '今回は見送る',          /* 画像の下の小さい閉じるリンク(''で非表示) */
  oncePer: 'session',                /* タブを閉じるまで1回 */
};
</script>
<script src="https://yhozumi-stack.github.io/hugskin-chatbot/popup.js?v=1" defer></script>
