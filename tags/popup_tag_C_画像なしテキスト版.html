<!-- ============================================================
  離脱ポップアップ タグ【C: 画像なしテキスト版】
  ------------------------------------------------------------
  クリエイティブ画像が無くても今すぐ出せる版。
  バッジ+タイトル+本文+CTAボタンの白カード。価格は{{PRICE}}で自動反映。

  ecforceタグ管理: チャットのタグの下(bodyの最後でもOK)に貼る。
  設定は全部このタグ内で完結=変更はタグ編集のみ・push不要・このLPだけに効く。

  ▼テスト時はこの2行を書き換える:
    triggers: ['back', 'delay5000'],   ← 5秒で出る
    oncePer: 'always',                 ← 毎回出る
  ============================================================ -->
<script>
window.HS_POPUP = {
  triggers: ['back', 'delay60000'],  /* ブラウザバック + 60秒経過 */
  /* image を書かない(または '')=自動でテキストモード */
  badge: '初回限定',                  /* タイトル上の小さいラベル(''で非表示) */
  title: 'ちょっとお待ちください！',
  lines: [                            /* 本文(1要素=1行)。{{PRICE}}未設定の行は自動で消える */
    'ただいま初回限定 {{PRICE}} でご案内しています。',
    'このページを閉じると、次回は通常価格でのご案内になる場合があります。',
  ],
  ctaText: '{{PRICE}}で試してみる',   /* PRICEはチャットのvarsから自動引き継ぎ */
  ctaAction: 'chat',                 /* タップでチャット起動('form'=フォームへ / URL=遷移) */
  closeText: '今回は見送る',          /* 下の小さい閉じるリンク(''で非表示) */
  oncePer: 'session',                /* タブを閉じるまで1回 */
  /* チャット無しLP(他ブランド等)で使う場合は↓も書く
  vars: { PRICE: '初回1,980円(税込)' },
  ctaAction: 'form',
  theme: { brand: '#C8869A' },
  */
};
</script>
<script src="https://yhozumi-stack.github.io/hugskin-chatbot/popup.js?v=2" defer></script>
