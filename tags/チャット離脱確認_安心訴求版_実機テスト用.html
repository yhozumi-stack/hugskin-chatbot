<!-- ============================================================
  HugSkin チャットボット タグ【チャット離脱確認 closeConfirm 安心訴求版】
  ------------------------------------------------------------
  ecforce タグ管理: このまま全部コピーして1つのタグとして登録(位置: body)

  役割:
  - チャットの×を押した時に「閉じる / チャットに戻る」の確認を出す
  - 白い確認UIは chatbot.js が描画
  - 下の画像だけ closeConfirm.image で差し替え

  注意:
  - LP離脱POP側の HS_POPUP triggers に 'chatclose' は入れない
  - 二重引き止めを避けるため、チャット閉じ対策は closeConfirm 側だけで行う
============================================================ -->
<script>
window.HS_CHAT = {
  scenario: 'formplus',                  /* form-plus再現シナリオ */
  vars: {
    PRICE: '2,980円（税込）',            /* 挨拶では未使用(formplusは名前質問が冒頭)。残してOK */
  },
  mode: 'float',
  autoOpen: 'immediate',                 /* 初回から自動起動 */
  openTriggers: 'a[href="#lp-form"]',    /* CTAボタンで再オープン */
  launcher: false,                       /* フローティングバナーを非表示 */
  countdown: true,                       /* カウントダウンバー */
  summaryOptions: { modal: true },       /* 確認画面をモーダルで */
  cardCvv: false,                        /* ZEUSがセキュリティコード不要設定のため、隠れCVV欄があっても聞かない・転記しない */
  autoSubmit: false,                     /* 3Dセキュア有効化(2026-07-08)によりボットの自動送信は3DS未認証オーソリで104になる。お客様の実クリックで確認画面→3DSの正規フローに乗せる */
  stepImages: {                          /* 支払い質問の直前にクレカ訴求画像 */
    payment: 'https://yhozumi-stack.github.io/hugskin-chatbot/img/payment_promo.png',
  },
  paymentLabels: {                       /* 支払いボタンの表示文言 */
    'クレジット': 'クレジットカード【手数料0円】',
    '後払い': 'ベリトランス後払い（コンビニ後払い）',
  },
  opening: {
    images: [                            /* 冒頭画像(不要なら2行とも削除) */
      'https://yhozumi-stack.github.io/hugskin-chatbot/img/chat_fv1_6980.png',
      'https://yhozumi-stack.github.io/hugskin-chatbot/img/chat_fv2_2980.jpeg',
    ],
    stockCheck: true,
  },
  closeConfirm: {
    title: '初回限定チャットを閉じますか？',
    leaveText: '閉じる',
    stayText: 'チャットに戻る',
    image: 'https://yhozumi-stack.github.io/hugskin-chatbot/img/hugskin_chat_close_confirm_reassurance_680w.webp?v=1',
  },
  /* 後払い規約文(codNotice)は既定で同梱済みなので書かなくてよい */
};
</script>
<script src="https://yhozumi-stack.github.io/hugskin-chatbot/chatbot.js?v=19" defer></script>
