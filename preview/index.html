<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【プレビュー】偽LP — HugSkin チャットボット動作確認用</title>
<style>
  body { font-family: 'Hiragino Sans', sans-serif; margin: 0; color: #333; }
  .hero { background: linear-gradient(135deg, #f9f1f4, #f0d9e2); padding: 60px 20px; text-align: center; }
  .hero h1 { color: #a86880; font-size: 28px; }
  section { max-width: 640px; margin: 0 auto; padding: 40px 20px; line-height: 1.9; }
  .cta { display: inline-block; background: #C8869A; color: #fff; padding: 14px 40px; border-radius: 99px; text-decoration: none; font-weight: 600; }
  .spacer { height: 60vh; background: repeating-linear-gradient(#fff, #fff 59px, #f5f5f5 60px); display:flex; align-items:center; justify-content:center; color:#bbb; }
</style>
</head>
<body>

<div class="hero">
  <h1>HugSkin C10 ALL IN SERUM</h1>
  <p>これはチャットボット動作確認用の偽LPです</p>
  <a href="#" class="cta" data-hs-open>今すぐ注文する</a>
</div>

<section>
  <h2>ダミーコンテンツ</h2>
  <p>スクロール起動（autoOpen: 'scroll30'）のテスト用に長さを確保しています。
     上のCTAボタンは data-hs-open 属性でチャットを開くフックのテストです。</p>
</section>
<div class="spacer">（スクロール領域）</div>

<!-- ▼▼ 実LP(hugskin.shop/lp)と同じname属性の注文フォームモック(2026-07-05実フォーム照合済) ▼▼ -->
<section>
  <h2>ご注文フォーム（モック）</h2>
  <p style="font-size:12px;color:#888">チャット完了時にここへ直接入力される(緑枠=入力成功)。実LPのname属性を再現。</p>
  <form action="/lp" method="post" onsubmit="return false" style="display:grid;gap:10px;max-width:480px">
    <label>お名前<input name="order[billing_address_attributes][name01]"></label>
    <label>フリガナ<input name="order[billing_address_attributes][kana01]"></label>
    <label>郵便番号<input name="order[billing_address_attributes][zip01]"></label>
    <label>都道府県
      <select name="order[billing_address_attributes][prefecture_id]">
        <option value="">選択してください</option>
        <option value="1">北海道</option><option value="13">東京都</option>
        <option value="14">神奈川県</option><option value="27">大阪府</option><option value="47">沖縄県</option>
      </select>
    </label>
    <label>住所1（市郡区／町・村）<input name="order[billing_address_attributes][addr01]"></label>
    <label>住所2（丁目・番地・マンション名・号室）<input name="order[billing_address_attributes][addr02]"></label>
    <label>電話番号<input name="order[billing_address_attributes][tel01]"></label>
    <label>メールアドレス<input type="email" name="order[email]"></label>
    <label>パスワード<input type="password" name="order[customer_attributes][password]"></label>
    <label>性別
      <select name="order[customer_attributes][sex_id]">
        <option value="">選択してください</option><option value="1">男性</option><option value="2">女性</option>
      </select>
    </label>
    <label>生年月日
      <select name="order[customer_attributes][birth(1i)]"><option value=""></option><option value="1990">1990</option><option value="1995">1995</option></select>
      <select name="order[customer_attributes][birth(2i)]"><option value=""></option><option value="1">1</option><option value="12">12</option></select>
      <select name="order[customer_attributes][birth(3i)]"><option value=""></option><option value="15">15</option><option value="31">31</option></select>
    </label>
    <label>お支払い方法
      <select name="order[payment_attributes][payment_method_id]">
        <option value="">選択してください</option>
        <option value="21">クレジットカード一括</option>
        <option value="102">ベリトランス後払い（コンビニ後払い）</option>
      </select>
    </label>
    <label>カード番号<input name="order[payment_attributes][source_attributes][number]" placeholder="例）4111xxxxxxxxxxxx"></label>
    <label>有効期限(月)
      <select name="order[payment_attributes][source_attributes][month]">
        <option value=""></option><option value="1">1</option><option value="4">4</option><option value="9">9</option><option value="12">12</option>
      </select>
    </label>
    <label>有効期限(年・下2桁)
      <select name="order[payment_attributes][source_attributes][year]">
        <option value=""></option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="30">30</option>
      </select>
    </label>
    <label>カード名義<input name="order[payment_attributes][source_attributes][name]" placeholder="例）HANAKO YAMADA"></label>
  </form>
</section>
<script>
  // 入力されたフィールドを緑枠にする(テスト可視化用)
  document.addEventListener('input', e => {
    if (e.target.name && e.target.value) e.target.style.outline = '2px solid #7bc47f';
  }, true);

  // ecforce実LPの「郵便番号自動補完」を模擬(実LPで確認した上書き挙動の再現)
  // zip01へのinputイベントの500ms後に addr01 を自動補完し addr02 をクリアする
  document.querySelector('[name="order[billing_address_attributes][zip01]"]')
    .addEventListener('input', () => {
      setTimeout(() => {
        const f = document.forms[0].action ? document.forms[0] : null;
        const a1 = document.querySelector('[name="order[billing_address_attributes][addr01]"]');
        const a2 = document.querySelector('[name="order[billing_address_attributes][addr02]"]');
        a1.value = '渋谷区神宮前';   // 補完で上書き
        a2.value = '';               // クリアされてしまう(これが実LPのバグ再現)
        a2.style.outline = '';
      }, 500);
    });
</script>
<!-- ▲▲ フォームモックここまで ▲▲ -->

<section>
  <p>ページ末尾。</p>
</section>

<!-- ▼▼ ここが ecforce タグ管理に貼るタグと同じ構造 ▼▼ -->
<script>
window.HS_CHAT = {
  scenario: 'standard',
  vars: {
    PRODUCT: 'HugSkin C10 ALL IN SERUM',
    PRICE:   '初回限定 1,980円（税込）',
    OFFER:   '初回限定',
  },
  mode: 'float',
  autoOpen: 'immediate',
  opening: { image: '', stockCheck: true, stockGifUrl: '' },
  /* プレビューでは転記先をモック注文フォームに向ける */
  ecforceOrderUrl: './orders_new_mock.html',
};
</script>
<script src="../chatbot.js" defer></script>
<!-- ▲▲ ここまで ▲▲ -->

</body>
</html>
